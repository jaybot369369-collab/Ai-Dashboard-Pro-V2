<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Blueprint · London</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────────────────────────── */
:root {
  --purple:    #7c5ff5;
  --purple-lt: #9b82f7;
  --orange:    #f97316;
  --green:     #22c55e;
  --red:       #ef4444;
  --blue:      #3b82f6;
  --teal:      #14b8a6;

  --tier-e:    #22c55e;
  --tier-r:    #f59e0b;
  --tier-g:    #ef4444;

  --radius:    14px;
  --radius-sm: 8px;
  --shadow:    0 2px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  --font:      'Inter', system-ui, -apple-system, sans-serif;
  --transition: .2s ease;
}

/* LIGHT */
[data-theme="light"] {
  --bg:        #f0f2f7;
  --surface:   #ffffff;
  --surface2:  #f7f8fc;
  --border:    #e5e7ef;
  --text:      #1e2130;
  --muted:     #7b7f96;
  --heading:   #0f1120;
  --shadow:    0 2px 12px rgba(0,0,0,.07);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
}
/* DARK */
[data-theme="dark"] {
  --bg:        #0d0f18;
  --surface:   #161926;
  --surface2:  #1d2135;
  --border:    #272c42;
  --text:      #c8cde8;
  --muted:     #656b8a;
  --heading:   #e8ecff;
  --shadow:    0 2px 12px rgba(0,0,0,.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.4);
}

/* ── RESET ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  transition: background var(--transition), color var(--transition);
}
button { font-family: var(--font); cursor: pointer; }
a { color: var(--purple); text-decoration: none; }
input, select, textarea { font-family: var(--font); }

/* ── LAYOUT ─────────────────────────────────────────────────────────────── */
.shell { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  transition: background var(--transition), border-color var(--transition);
}
.sidebar-brand {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
}
.brand-mark {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--purple), #4f46e5);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}
.brand-text { line-height: 1.2; }
.brand-title { font-size: 15px; font-weight: 700; color: var(--heading); }
.brand-sub { font-size: 11px; color: var(--muted); }

.sidebar-section { padding: 18px 12px 4px; }
.sidebar-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 0 8px; margin-bottom: 4px; }
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 9px 10px; border: none; background: none;
  color: var(--muted); border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 500;
  transition: all var(--transition);
  text-align: left;
}
.nav-btn .icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: linear-gradient(135deg, rgba(124,95,245,.18), rgba(79,70,229,.1)); color: var(--purple-lt); font-weight: 600; }
[data-theme="light"] .nav-btn.active { background: rgba(124,95,245,.1); color: var(--purple); }

.sidebar-footer {
  margin-top: auto;
  padding: 16px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.theme-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  cursor: pointer;
}
.theme-toggle-label { font-size: 12px; font-weight: 500; color: var(--muted); }
.toggle-pill {
  width: 38px; height: 20px;
  background: var(--border);
  border-radius: 10px;
  position: relative;
  transition: background var(--transition);
  border: none;
  cursor: pointer;
  flex-shrink: 0;
}
.toggle-pill.on { background: var(--purple); }
.toggle-pill::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: transform var(--transition);
}
.toggle-pill.on::after { transform: translateX(18px); }

/* HEADER EXPORT BTNS */
.export-row {
  display: flex; gap: 6px;
}
.icon-btn {
  flex: 1; padding: 7px 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  font-size: 12px; font-weight: 500;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all var(--transition);
}
.icon-btn:hover { border-color: var(--purple); color: var(--purple); background: rgba(124,95,245,.07); }

/* MAIN CONTENT */
.main {
  flex: 1;
  padding: 28px 28px;
  max-width: 100%;
  overflow-x: hidden;
}

/* ── CARDS ──────────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  box-shadow: var(--shadow);
  transition: background var(--transition), border-color var(--transition);
}
.card-title {
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .8px;
  color: var(--muted); margin-bottom: 14px;
}

/* ── KPI STAT CARDS ─────────────────────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 14px;
  transition: all var(--transition);
}
.kpi-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.kpi-icon {
  width: 46px; height: 46px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.kpi-icon.purple { background: rgba(124,95,245,.15); }
.kpi-icon.orange { background: rgba(249,115,22,.15); }
.kpi-icon.green  { background: rgba(34,197,94,.15); }
.kpi-icon.blue   { background: rgba(59,130,246,.15); }
.kpi-num { font-size: 24px; font-weight: 700; color: var(--heading); line-height: 1; margin-bottom: 3px; }
.kpi-label { font-size: 12px; color: var(--muted); font-weight: 500; }

/* ── GRID LAYOUTS ───────────────────────────────────────────────────────── */
.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-65-35 { grid-template-columns: 1.8fr 1fr; }

/* ── VIEW HEADER ────────────────────────────────────────────────────────── */
.view-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.view-header h2 { font-size: 20px; font-weight: 700; color: var(--heading); }
.view-header .meta { font-size: 13px; color: var(--muted); }
.view-header-right { display: flex; gap: 8px; align-items: center; }

/* ── BADGE ──────────────────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 7px; border-radius: 20px;
  font-size: 10px; font-weight: 600; letter-spacing: .3px;
  cursor: help;
}
.badge.e { background: rgba(34,197,94,.12); color: var(--tier-e); border: 1px solid rgba(34,197,94,.25); }
.badge.r { background: rgba(245,158,11,.12); color: var(--tier-r); border: 1px solid rgba(245,158,11,.25); }
.badge.g { background: rgba(239,68,68,.12); color: var(--tier-g);  border: 1px solid rgba(239,68,68,.25); }

.legend-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }

/* ── FORMS ──────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 13px; }
.form-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 6px; }
.form-control {
  width: 100%; padding: 9px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 13.5px;
  transition: border-color var(--transition);
  font-family: var(--font);
}
.form-control:focus { outline: none; border-color: var(--purple); box-shadow: 0 0 0 3px rgba(124,95,245,.12); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* ── BUTTONS ────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; border: none;
  cursor: pointer; transition: all var(--transition);
}
.btn-primary { background: linear-gradient(135deg, var(--purple), #4f46e5); color: #fff; }
.btn-primary:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,95,245,.35); }
.btn-outline {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
}
.btn-outline:hover { border-color: var(--purple); color: var(--purple); }
.btn-danger { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,.18); }
.btn-success { background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3); color: var(--green); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── CHECKLIST ──────────────────────────────────────────────────────────── */
.checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.check-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; font-size: 13px; transition: all var(--transition);
}
.check-item:hover { border-color: var(--purple); }
.check-item input[type=checkbox] { accent-color: var(--purple); width: 15px; height: 15px; cursor: pointer; }
.check-item.checked { border-color: rgba(124,95,245,.4); background: rgba(124,95,245,.06); color: var(--purple-lt); }

/* ── TABLES ─────────────────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left; padding: 10px 12px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px;
  color: var(--muted); background: var(--surface2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--text); }
tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: var(--surface2); }

/* ── DETAILS / EXPAND ───────────────────────────────────────────────────── */
details { margin-top: 5px; }
details summary {
  font-size: 11px; color: var(--muted); cursor: pointer;
  list-style: none; display: flex; align-items: center; gap: 4px;
  padding: 2px 0;
}
details summary::-webkit-details-marker { display: none; }
details summary::before { content: '▸'; font-size: 10px; }
details[open] summary::before { content: '▾'; }
details summary:hover { color: var(--purple); }
.detail-body {
  margin-top: 6px; padding: 10px 12px;
  background: var(--bg); border-left: 2px solid var(--purple);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 12px; color: var(--muted); line-height: 1.6;
}

/* ── PROGRESS RING ──────────────────────────────────────────────────────── */
.ring-wrap { display: flex; align-items: center; gap: 14px; }
.ring-label { font-size: 13px; }
.ring-val { font-size: 24px; font-weight: 700; color: var(--heading); }

/* ── RECENT LOG CHIPS ───────────────────────────────────────────────────── */
.log-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 11px; font-weight: 500;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted);
}
.log-chip.ok { background: rgba(34,197,94,.08); border-color: rgba(34,197,94,.2); color: var(--green); }
.log-chip.warn { background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.2); color: var(--tier-r); }

/* ── TEXTAREA ────────────────────────────────────────────────────────────── */
textarea.form-control { resize: vertical; min-height: 70px; }

/* ── STATUS TEXT ─────────────────────────────────────────────────────────── */
.status-text { font-size: 12px; color: var(--green); margin-top: 6px; }

/* ── DIVIDER ─────────────────────────────────────────────────────────────── */
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* ── PILL TAB ────────────────────────────────────────────────────────────── */
.pill-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.pill-tab {
  padding: 5px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted); cursor: pointer;
  transition: all var(--transition);
}
.pill-tab.active { background: var(--purple); border-color: var(--purple); color: #fff; }
.pill-tab:hover:not(.active) { border-color: var(--purple); color: var(--purple); }

/* ── MY PLAN SECTION ────────────────────────────────────────────────────── */
.plan-list { list-style: none; }
.plan-list li {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.plan-list li:last-child { border-bottom: none; }
.plan-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); flex-shrink: 0; margin-top: 6px; }

/* ── MOBILE ──────────────────────────────────────────────────────────────── */
.menu-btn {
  display: none; position: fixed; top: 14px; left: 14px; z-index: 60;
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-size: 18px;
  align-items: center; justify-content: center;
  box-shadow: var(--shadow);
}
@media (max-width: 860px) {
  .sidebar {
    position: fixed; top: 0; left: -260px; width: 240px;
    height: 100vh; z-index: 50; transition: left .25s ease;
    box-shadow: var(--shadow-lg);
  }
  .sidebar.open { left: 0; }
  .menu-btn { display: flex; }
  .main { padding: 18px 16px; margin-top: 50px; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .grid-2, .grid-3, .grid-65-35 { grid-template-columns: 1fr; }
  .checklist { grid-template-columns: 1fr; }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
}
@media (max-width: 520px) {
  .kpi-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<button class="menu-btn" id="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

<div class="shell">
<!-- ── SIDEBAR ─────────────────────────────────────────────────────────── -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-mark">
      <div class="brand-icon">🧬</div>
      <div class="brand-text">
        <div class="brand-title">Blueprint · LDN</div>
        <div class="brand-sub">Longevity protocol</div>
      </div>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Operate</div>
    <button class="nav-btn active" data-view="today"><span class="icon">📅</span> Today</button>
    <button class="nav-btn" data-view="trends"><span class="icon">📈</span> Trends</button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Pillars</div>
    <button class="nav-btn" data-view="diet"><span class="icon">🥗</span> Diet &amp; Supplements</button>
    <button class="nav-btn" data-view="sleep"><span class="icon">🌙</span> Sleep &amp; Circadian</button>
    <button class="nav-btn" data-view="exercise"><span class="icon">🏋️</span> Exercise</button>
    <button class="nav-btn" data-view="biomarkers"><span class="icon">🩸</span> Biomarkers</button>
    <button class="nav-btn" data-view="errata"><span class="icon">⚡</span> Mistakes &amp; Wins</button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Synthesis</div>
    <button class="nav-btn" data-view="myplan"><span class="icon">🗺️</span> My Plan</button>
    <button class="nav-btn" data-view="compare"><span class="icon">⚖️</span> Bryan vs Me</button>
  </div>

  <div class="sidebar-footer">
    <div class="export-row">
      <button class="icon-btn" id="btn-export-quick" title="Download data backup">⬇ Export</button>
      <button class="icon-btn" id="btn-import-trigger" title="Import data backup">⬆ Import</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none"/>
    <div class="theme-toggle" id="theme-toggle">
      <span class="theme-toggle-label" id="theme-label">🌙 Dark mode</span>
      <div class="toggle-pill on" id="toggle-pill"></div>
    </div>
  </div>
</nav>

<!-- ── MAIN ───────────────────────────────────────────────────────────── -->
<main class="main" id="main-content"></main>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   TIER BADGES
═══════════════════════════════════════════════════════════════════════════ */
const T = {
  e: '<span class="badge e" title="Established — well-evidenced in published research, broadly applicable across populations">[E] Established</span>',
  r: '<span class="badge r" title="Reasonable extrapolation — mechanism or adjacent evidence supports it, not directly tested in your ancestry">[R] Reasonable</span>',
  g: '<span class="badge g" title="Educated guess — best inference from limited data; confirm with your own bloodwork or a clinician">[G] Educated guess</span>',
  short: {
    e: '<span class="badge e" title="Established">[E]</span>',
    r: '<span class="badge r" title="Reasonable extrapolation">[R]</span>',
    g: '<span class="badge g" title="Educated guess">[G]</span>'
  }
};

/* ═══════════════════════════════════════════════════════════════════════════
   PROTOCOL DATA
═══════════════════════════════════════════════════════════════════════════ */
const PROTOCOL = {
  diet: {
    title: 'Diet & Supplements',
    rows: [
      { topic:'Calories', bryan:'~2,250 kcal/day, ~10% below maintenance', mine:'10% deficit reasonable; track HbA1c + fasting insulin, not BMI. CREBRF variant (Polynesian) can decouple BMI from metabolic risk.', tier:'r', why:'CALERIE-2 supports modest CR for biomarker improvement [E]. CREBRF variant affects BMI/T2D coupling in Pacific-ancestry populations [R].' },
      { topic:'Eating window', bryan:'6am–11am (16h fast)', mine:'10am–6pm or 12pm–8pm (~14h fast). Consistency matters more than the absolute window.', tier:'e', why:'TRF benefit plateaus around 12–14h. Ultra-early windows are a lifestyle choice, not a biological requirement.' },
      { topic:'Protein', bryan:'~130g/day (1.7 g/kg)', mine:'1.2–1.6 g/kg until APOL1 genotype + eGFR known. Raise only if both clean.', tier:'g', why:'APOL1 G1/G2 risk variants are prevalent in West African ancestry. East African (Kenyan) prevalence is lower but non-zero. High protein stresses compromised kidneys.' },
      { topic:'Dairy', bryan:'None currently', mine:'None until lactase persistence confirmed via test or elimination-and-reintroduce.', tier:'r', why:'Bantu-ancestry lactase non-persistence is the norm. Nilotic/Maasai groups within Kenya are often persistent. You may already know your tolerance.' },
      { topic:'Sodium', bryan:'Not aggressively restricted', mine:'<2,300 mg/day if BP >120/75. London takeaway easily hits 4,000+ mg — track it.', tier:'r', why:'West African–ancestry populations show higher salt sensitivity on average (lower renin profile, higher BP response).' },
      { topic:'Vitamin D3', bryan:'2,000 IU + K2 600 mcg MK-7', mine:'3,000–5,000 IU Oct–Apr; 1,000–2,000 IU May–Sep. K2 100–200 mcg. Calibrate to 25(OH)D bloodwork.', tier:'r', why:'Darker skin synthesises less D3 per UVB dose [E]. London 51°N = zero D3 synthesis Oct–Mar regardless of skin tone [E]. Specific dose requires your bloodwork.' },
      { topic:'Iron / ferritin', bryan:'Not separately supplemented', mine:'Do not add iron-containing supplements without ferritin + TSAT baseline first.', tier:'e', why:'Direction depends entirely on genotype + diet. Polynesian sub-groups carry hemochromatosis-adjacent variants in some lineages; West African–ancestry carries higher anemia risk. Test before supplementing.' },
      { topic:'Omega-3 EPA+DHA', bryan:'~800 mg/day', mine:'1–2 g EPA+DHA/day', tier:'e', why:'Robust cardiovascular evidence across populations.' },

   STATE
═══════════════════════════════════════════════════════════════════════════ */
const STORE_KEY = 'blueprint-ldn-v3';
let state = { logs: [] };
try { const r = localStorage.getItem(STORE_KEY); if(r) state = JSON.parse(r); } catch(e) {}
function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {} }

const SUPPS = ['Vit D3 + K2','Omega-3','Magnesium','Creatine','Psyllium','B12','Multivit'];

/* ═══════════════════════════════════════════════════════════════════════════
   THEME
═══════════════════════════════════════════════════════════════════════════ */
let theme = localStorage.getItem('blueprint-theme') || 'dark';
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  const pill = document.getElementById('toggle-pill');
  const label = document.getElementById('theme-label');
  if(t === 'dark') { pill.classList.add('on'); label.textContent = '🌙 Dark mode'; }
  else             { pill.classList.remove('on'); label.textContent = '☀️ Light mode'; }
  localStorage.setItem('blueprint-theme', t);
  // Refresh charts if on trends view
  if(document.querySelector('nav .nav-btn[data-view="trends"].active')) setView('trends');
}
document.getElementById('theme-toggle').addEventListener('click', () => applyTheme(theme === 'dark' ? 'light' : 'dark'));
applyTheme(theme);

/* ═══════════════════════════════════════════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════════════════════════════════════════ */
document.getElementById('btn-export-quick').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'blueprint-london-'+todayStr()+'.json'; a.click();
});
document.getElementById('btn-import-trigger').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      state = JSON.parse(ev.target.result); save();
      alert('✓ Imported '+( state.logs?.length||0)+' log entries successfully.');
      setView(currentView);
    } catch(err) { alert('Import failed: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ═══════════════════════════════════════════════════════════════════════════
   ROUTER
═══════════════════════════════════════════════════════════════════════════ */
let currentView = 'today';
function setView(name) {
  currentView = name;
  document.querySelectorAll('.nav-btn[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === name));
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  (VIEWS[name] || VIEWS.today)(main);
  if(window.innerWidth <= 860) document.getElementById('sidebar').classList.remove('open');
  window.scrollTo(0,0);
}
document.querySelectorAll('.nav-btn[data-view]').forEach(b => b.addEventListener('click', () => setView(b.dataset.view)));

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════════ */
function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function mkViewHeader(title, meta, extraHtml) {
  return `<div class="view-header"><div><h2>${title}</h2>${meta?`<div class="meta" style="margin-top:3px">${meta}</div>`:''}</div><div class="view-header-right">${extraHtml||''}</div></div>`;
}
function legendBar() {
  return `<div class="legend-row">${T.e} ${T.r} ${T.g}</div>`;
}
function pillarTable(key) {
  const p = PROTOCOL[key];
  if(p.isErrata) {
    let h = `<div class="table-wrap"><table><thead><tr><th>Topic</th><th>Result</th><th>What Bryan Found</th><th>Lesson for Me</th><th>Tier</th></tr></thead><tbody>`;
    p.rows.forEach(r => {
      const vColor = r.verdict==='Win'?'var(--green)': r.verdict==='Reversal'?'var(--red)':'var(--tier-r)';
      h += `<tr>
        <td><strong>${r.topic}</strong></td>
        <td><span style="font-size:11px;font-weight:600;color:${vColor}">${r.verdict}</span></td>
        <td style="color:var(--muted);font-size:12px">${r.text}</td>
        <td>${r.lesson}</td>
        <td>${T.short[r.tier]}</td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
    return h;
  }
  let h = `<div class="table-wrap"><table><thead><tr><th>Topic</th><th>Bryan</th><th>My Adaptation</th><th>Tier</th></tr></thead><tbody>`;
  p.rows.forEach(r => {
    h += `<tr>
      <td style="white-space:nowrap"><strong>${r.topic}</strong></td>
      <td style="color:var(--muted);font-size:12px">${r.bryan}</td>
      <td>${r.mine}<details><summary>Why this adaptation?</summary><div class="detail-body">${r.why}</div></details></td>
      <td>${T.short[r.tier]}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

      const moodOk  = l.mood >= 7;
      summCard.innerHTML += `
        <div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:13px;font-weight:600;color:var(--heading)">${l.date}</span>
            ${l.workout&&l.workout!=='rest'?`<span class="log-chip ok">🏋️ ${l.workout}</span>`:''}
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${l.sleep_h!==null?`<span class="log-chip ${sleepOk?'ok':'warn'}">😴 ${l.sleep_h}h</span>`:''}
            ${l.mood!==null?`<span class="log-chip ${moodOk?'ok':'warn'}">🧠 ${l.mood}/10</span>`:''}
            ${l.weight_kg!==null?`<span class="log-chip">⚖️ ${l.weight_kg}kg</span>`:''}
            ${l.supps?.length?`<span class="log-chip ok">💊 ${l.supps.length}/${SUPPS.length}</span>`:''}
          </div>
        </div>`;
    });
    summCard.innerHTML += `<button class="btn btn-outline btn-sm" style="margin-top:14px;width:100%" onclick="setView('trends')">View Trends →</button>`;
  } else {
    summCard.innerHTML = `<div class="card-title">Recent Log</div>
      <div style="padding:30px 0;text-align:center">
        <div style="font-size:32px;margin-bottom:10px">📋</div>
        <div style="color:var(--muted);font-size:13px">No entries yet.<br>Fill in the form to start tracking.</div>
      </div>`;
  }
  grid.appendChild(summCard);
  root.appendChild(grid);
};

/* ── TRENDS ───────────────────────────────────────────────────────────── */
VIEWS.trends = (root) => {
  root.innerHTML = mkViewHeader('Trends', 'Charts populate as you log daily entries');

  const logs = [...state.logs].sort((a,b)=>a.date<b.date?-1:1);
  if(logs.length < 1) {
    const c = document.createElement('div'); c.className = 'card';
    c.innerHTML = `<div style="padding:40px;text-align:center"><div style="font-size:40px;margin-bottom:12px">📈</div><div style="color:var(--muted)">No data yet. Log at least one entry on the Today tab.</div></div>`;
    root.appendChild(c); return;
  }

  const cd = chartDefaults();
  const grid = document.createElement('div');
  grid.className = 'grid grid-2';

  function sparkCard(containerId, title, datasets, labels, type='line') {
    const card = document.createElement('div'); card.className = 'card';
    card.innerHTML = `<div class="card-title">${title}</div><canvas id="${containerId}" style="max-height:200px"></canvas>`;
    grid.appendChild(card);
    requestAnimationFrame(() => {
      const ctx = document.getElementById(containerId)?.getContext('2d');
      if(!ctx) return;
      new Chart(ctx, {
        type,
        data: { labels, datasets },
        options: {
          responsive: true,
          plugins: {
            legend: { display: datasets.length > 1, labels: { color: cd.tickColor, font:{size:11} } },
            tooltip: { backgroundColor: cd.tooltipBg, titleColor: cd.tooltipText, bodyColor: cd.tooltipText }
          },
          scales: {
            x: { ticks:{color:cd.tickColor,font:{size:10}}, grid:{color:cd.gridColor} },
            y: { ticks:{color:cd.tickColor,font:{size:10}}, grid:{color:cd.gridColor} }
          }
        }
      });
    });
  }

  const dates = logs.map(l=>l.date.slice(5));

  // Sleep
  sparkCard('c_sleep','Sleep (hours)',[{
    label:'Sleep',data:logs.map(l=>l.sleep_h),
    borderColor:'#7c5ff5',backgroundColor:'rgba(124,95,245,.12)',tension:.3,pointRadius:4,fill:true,borderWidth:2,
    pointBackgroundColor:'#7c5ff5'
  }], dates);

  // Weight
  sparkCard('c_weight','Weight (kg)',[{
    label:'Weight',data:logs.map(l=>l.weight_kg),
    borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',tension:.3,pointRadius:4,fill:true,borderWidth:2,
    pointBackgroundColor:'#22c55e'
  }], dates);

  // Mood
  sparkCard('c_mood','Mood (1–10)',[{
    label:'Mood',data:logs.map(l=>l.mood),
    borderColor:'#f97316',backgroundColor:'rgba(249,115,22,.1)',tension:.3,pointRadius:4,fill:true,borderWidth:2,
    pointBackgroundColor:'#f97316'
  }], dates);

  // Biomarker
  const lastBio = [...logs].reverse().find(l=>l.biomarker_name);
  if(lastBio) {
    const series = logs.filter(l=>l.biomarker_name===lastBio.biomarker_name && l.biomarker_value!==null);
    if(series.length > 0) {
      sparkCard('c_bio',`Biomarker: ${lastBio.biomarker_name}`,[{
        label:lastBio.biomarker_name,data:series.map(l=>l.biomarker_value),
        borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',tension:.3,pointRadius:4,fill:true,borderWidth:2,
        pointBackgroundColor:'#3b82f6'
      }], series.map(l=>l.date.slice(5)));
    }
  }

  // Workout frequency bar
  const wkMap = {};
  logs.forEach(l=>{ if(l.workout&&l.workout!=='rest') wkMap[l.workout]=(wkMap[l.workout]||0)+1; });
  if(Object.keys(wkMap).length > 0) {
    const colors = { strength:'#7c5ff5', zone2:'#22c55e', hiit:'#ef4444', mobility:'#14b8a6', walk:'#f97316' };
    sparkCard('c_wk','Workout Breakdown',[{
      label:'Sessions',
      data:Object.values(wkMap),
      backgroundColor:Object.keys(wkMap).map(k=>colors[k]||'#7c5ff5')+'99',
      borderColor:Object.keys(wkMap).map(k=>colors[k]||'#7c5ff5'),
      borderWidth:1, borderRadius:6
    }], Object.keys(wkMap), 'bar');
  }

  // Supplement adherence trend
  const suppTrend = logs.filter(l=>l.supps).map(l=>({date:l.date.slice(5),pct:Math.round(100*l.supps.length/SUPPS.length)}));
  if(suppTrend.length > 0) {
    sparkCard('c_supp','Supplement Adherence (%)',[{
      label:'Adherence %',data:suppTrend.map(s=>s.pct),
      borderColor:'#14b8a6',backgroundColor:'rgba(20,184,166,.1)',tension:.3,pointRadius:4,fill:true,borderWidth:2,
      pointBackgroundColor:'#14b8a6'
    }], suppTrend.map(s=>s.date));
  }

  root.appendChild(grid);
};

/* ── PILLAR VIEWS ─────────────────────────────────────────────────────── */
